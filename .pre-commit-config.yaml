# Local hooks: run the tools already installed in the project virtualenv.
#
# We deliberately avoid the upstream black/ruff pre-commit repos because building
# their isolated hook environments stalled on first run in this project, which left
# commits hanging with a stale .git/index.lock. `language: system` runs ruff/black
# straight from PATH (the activated .venv), so there is nothing to install.
#
# Tool configuration (line length, excludes, lint rules) lives in pyproject.toml.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint, autofix)
        entry: ruff check --force-exclude --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: black
        name: black (format)
        entry: black
        language: system
        types_or: [python, pyi]
        require_serial: true
