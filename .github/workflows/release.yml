name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and attach distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check the tag matches clippy.__version__
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import re,pathlib; print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('clippy/__init__.py').read_text()).group(1))")
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $GITHUB_REF_NAME does not match clippy.__version__ ($pkg)" >&2
            exit 1
          fi

      - name: Attach distributions to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
